<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon5.png">
<title>Ma Cuisine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f3ee;
    --surface:   #ffffff;
    --border:    #e8e0d5;
    --border2:   #d4c8b8;
    --text:      #1c1710;
    --muted:     #8a7f72;
    --accent:    #2c2318;

    --cat-entree:  #2e5e4e;
    --cat-plat:    #7a2e1a;
    --cat-dessert: #7a4f1a;
    --cat-base:    #1a3a5e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 400;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    letter-spacing: -1px;
  }
  .header-title em {
    font-style: italic;
    font-weight: 400;
  }
  .header-rule {
    width: 40px;
    height: 1px;
    background: var(--border2);
    margin: 18px auto 14px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .header-sub strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── MAIN ────────────────────────────────── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 20px 64px;
  }

  /* ── CATEGORY SECTION ────────────────────── */
  .category-section {
    margin-bottom: 44px;
    animation: fadeUp 0.5s ease both;
  }
  .category-section:nth-child(1) { animation-delay: 0.05s; }
  .category-section:nth-child(2) { animation-delay: 0.12s; }
  .category-section:nth-child(3) { animation-delay: 0.19s; }
  .category-section:nth-child(4) { animation-delay: 0.26s; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    flex: 1;
  }
  .cat-count {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── RECIPE CARDS ────────────────────────── */
  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .recipe-card {
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    position: relative;
  }
  .recipe-card:hover { background: #faf7f3; }
  .recipe-card:active { background: #f3ede5; }

  .card-left {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .card-time {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }
  .card-chevron {
    color: var(--border2);
    font-size: 14px;
    line-height: 1;
  }

  /* ── FOOTER ──────────────────────────────── */
  footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--border2);
    padding-bottom: 32px;
  }
  #version-badge { margin-left: 6px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Carnet de recettes</div>
  <h1 class="header-title">Ma <em>Cuisine</em></h1>
  <div class="header-rule"></div>
  <p class="header-sub"><strong id="total-count">0</strong> recettes sauvegardées</p>
</header>

<main id="main"></main>

<div class="toast" id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1710;border-radius:40px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:13px;color:#f7f3ee;z-index:999;transition:transform 0.3s ease;white-space:nowrap;">
  🍴 Mise à jour disponible
  <button onclick="location.reload()" style="background:#c9a84c;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:#1c1710;cursor:pointer;">Actualiser</button>
</div>

<script>
  const APP_VERSION = 'v1.10.0';

  const RECIPES = [
    { emoji:"🥕", title:"Soupe Carottes & Gingembre", category:"Entrée", desc:"Velouté doux et parfumé, crème fraîche", time:"35 min", file:"soupe_carottes_gingembre.html" },

    { emoji:"🍅", title:"Ratatouille Provençale",     category:"Plat",   desc:"Légumes mijotés, herbes de Provence, huile d'olive", time:"55 min", file:"ratatouille.html" },
    { emoji:"🍗", title:"Poulet Basquaise",            category:"Plat",   desc:"Poulet mijoté, poivrons, tomates, piment d'Espelette", time:"60 min", file:"poulet-basquaise.html" },
    { emoji:"🍟", title:"Frites au Four",              category:"Plat",   desc:"Croustillantes dehors, fondantes dedans, sans friture", time:"55 min", file:"frites-au-four.html" },
    { emoji:"🍝", title:"Spaghetti Carbonara",         category:"Plat",   desc:"Guanciale, pecorino, œufs — la vraie recette romaine", time:"25 min", file:"carbonara.html" },

    { emoji:"🥞", title:"Crêpes",                      category:"Dessert", desc:"Pâte légère, version nature ou à la bière blonde", time:"25 min", file:"crepes_fancy.html" },
    { emoji:"🍌", title:"Gâteau Banane & Chocolat",    category:"Dessert", desc:"Moule papier, miel, chocolat noir, sans beurre", time:"30 min", file:"gateau_banane_chocolat.html" },
    { emoji:"💪", title:"Banana Bread Protéiné",       category:"Dessert", desc:"Whey chocolat, flocons avoine, ~200 kcal / tranche", time:"50 min", file:"banana-bread-proteine.html" },
    { emoji:"🍡", title:"Chouquettes",                 category:"Dessert", desc:"Pâte à choux légère, perles de sucre, cuisson dorée", time:"40 min", file:"chouquettes.html" },
    { emoji:"🍎", title:"Cake Pomme & Cannelle",       category:"Dessert", desc:"Protéiné, whey vanille, yaourt grec, ~180 kcal/tranche", time:"50 min", file:"cake-pomme-cannelle.html" },

    { emoji:"🥚", title:"Mayonnaise Maison",           category:"Base",   desc:"Onctueuse, rapide, meilleure que celle du commerce", time:"5 min", file:"recette-mayonnaise.html" },
  ];

  const CATEGORIES = [
    { key: "Entrée",  label: "Entrées",  color: "#2e5e4e" },
    { key: "Plat",    label: "Plats",    color: "#7a2e1a" },
    { key: "Dessert", label: "Desserts", color: "#7a4f1a" },
    { key: "Base",    label: "Bases & Sauces", color: "#1a3a5e" },
  ];

  function render() {
    document.getElementById('total-count').textContent = RECIPES.length;
    const main = document.getElementById('main');
    main.innerHTML = '';

    CATEGORIES.forEach(cat => {
      const recipes = RECIPES.filter(r => r.category === cat.key);
      if (!recipes.length) return;

      const section = document.createElement('section');
      section.className = 'category-section';

      section.innerHTML = `
        <div class="cat-header">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <h2 class="cat-title">${cat.label}</h2>
          <span class="cat-count">${recipes.length} recette${recipes.length > 1 ? 's' : ''}</span>
        </div>
        <div class="cards-list">
          ${recipes.map(r => `
            <a class="recipe-card" href="${r.file}">
              <div class="card-left">${r.emoji}</div>
              <div class="card-body">
                <div class="card-title">${r.title}</div>
                <div class="card-desc">${r.desc}</div>
              </div>
              <div class="card-right">
                <span class="card-time">⏱ ${r.time}</span>
                <span class="card-chevron">›</span>
              </div>
            </a>
          `).join('')}
        </div>
      `;
      main.appendChild(section);
    });

    const footer = document.createElement('footer');
    footer.innerHTML = `Ma Cuisine <span id="version-badge">${APP_VERSION}</span>`;
    main.appendChild(footer);
  }

  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) {
            document.getElementById('toast').style.transform = 'translateX(-50%) translateY(0)';
          }
        });
      });
    });
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; location.reload(); }
    });
  }
</script>
</body>
</html>
