<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ma Cuisine</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon5.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0d;
    --surface: #1a1a16;
    --surface2: #222220;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f0ece3;
    --muted: rgba(240,236,227,0.45);
    --accent: #c8a96e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
  .wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 0 20px 60px; }
  header { padding: 52px 0 40px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 0.5px solid var(--border); margin-bottom: 40px; }
  .brand-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 400; margin-bottom: 8px; }
  .brand-title { font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 300; line-height: 1; color: var(--text); letter-spacing: -0.5px; }
  .brand-title em { font-style: italic; color: var(--accent); }
  .recipe-count { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--muted); text-align: right; line-height: 1.4; }
  .recipe-count strong { display: block; font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--text); line-height: 1; }
  .filters { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .filter-btn { background: none; border: 0.5px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase; padding: 7px 16px; border-radius: 40px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f0d; font-weight: 500; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 24px 22px 20px; cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s, background 0.2s, transform 0.18s; position: relative; overflow: hidden; animation: fadeUp 0.4s ease both; }
  .card:hover { border-color: var(--border-hover); background: var(--surface2); transform: translateY(-2px); }
  .card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.10s} .card:nth-child(3){animation-delay:0.15s} .card:nth-child(4){animation-delay:0.20s}
  .card-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-color, var(--accent)); opacity: 0.7; }
  .card-emoji { font-size: 30px; line-height: 1; }
  .card-body { flex: 1; }
  .card-category { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 400; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
  .card-desc { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.5; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .card-time { font-size: 11px; color: var(--muted); }
  .card-arrow { width: 26px; height: 26px; border: 0.5px solid var(--border-hover); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; transition: all 0.2s; }
  .card:hover .card-arrow { background: var(--accent); border-color: var(--accent); color: #0f0f0d; }
  .card-add { border: 0.5px dashed var(--border-hover); background: transparent; align-items: center; justify-content: center; text-align: center; gap: 8px; min-height: 160px; }
  .card-add:hover { background: var(--surface); }
  .card-add-plus { width: 36px; height: 36px; border: 0.5px solid var(--border-hover); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--muted); margin: 0 auto; }
  .card-add-label { font-size: 13px; font-weight: 300; color: var(--muted); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 0.5px solid var(--border-hover); border-radius: 40px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-btn { background: var(--accent); border: none; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: #0f0f0d; cursor: pointer; }
  footer { text-align: center; padding-top: 48px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(240,236,227,0.2); }
  #version-badge { margin-left: 8px; font-size: 10px; color: rgba(240,236,227,0.15); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-eyebrow">Carnet de recettes</div>
      <h1 class="brand-title">Ma <em>Cuisine</em></h1>
    </div>
    <div class="recipe-count">
      <strong id="count">0</strong>
      recettes<br>sauvegardées
    </div>
  </header>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toutes</button>
    <button class="filter-btn" data-filter="Dessert">Dessert</button>
    <button class="filter-btn" data-filter="Plat">Plat</button>
    <button class="filter-btn" data-filter="Entrée">Entrée</button>
  </div>
  <div class="grid" id="grid"></div>
  <footer>Ma Cuisine &mdash; Carnet personnel <span id="version-badge"></span></footer>
</div>

<div class="toast" id="toast">
  🍴 Mise à jour disponible
  <button class="toast-btn" onclick="location.reload()">Actualiser</button>
</div>

<script>
  const APP_VERSION = 'v1.0.0';
  document.getElementById('version-badge').textContent = APP_VERSION;

  const RECIPES = [
    { emoji:"🥞", title:"Crêpes", category:"Dessert", desc:"Pâte légère, version nature ou à la bière blonde", time:"25 min", file:"crepes_fancy.html", color:"#c8a96e" },
    { emoji:"🍅", title:"Ratatouille Provençale", category:"Plat", desc:"Légumes mijotés, herbes de Provence, huile d'olive", time:"55 min", file:"ratatouille.html", color:"#c1440e" },
    { emoji:"🥕", title:"Soupe Carottes & Gingembre", category:"Entrée", desc:"Velouté doux et parfumé, crème fraîche", time:"35 min", file:"soupe_carottes_gingembre.html", color:"#E8620A" },
    { emoji:"🍌", title:"Gâteau Banane & Chocolat", category:"Dessert", desc:"Moule papier, miel, chocolat noir, sans beurre", time:"30 min", file:"gateau_banane_chocolat.html", color:"#e8a020" }
  ];

  let activeFilter = "all";

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const filtered = activeFilter === 'all' ? RECIPES : RECIPES.filter(r => r.category === activeFilter);
    document.getElementById('count').textContent = RECIPES.length;
    filtered.forEach(r => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = r.file;
      a.style.setProperty('--card-color', r.color);
      a.innerHTML = `<div class="card-accent-bar"></div><div class="card-emoji">${r.emoji}</div><div class="card-body"><div class="card-category">${r.category}</div><div class="card-title">${r.title}</div><div class="card-desc">${r.desc}</div></div><div class="card-meta"><span class="card-time">⏱ ${r.time}</span><span class="card-arrow">→</span></div>`;
      grid.appendChild(a);
    });
    const add = document.createElement('div');
    add.className = 'card card-add';
    add.innerHTML = `<div class="card-add-plus">+</div><div class="card-add-label">Nouvelle recette</div>`;
    grid.appendChild(add);
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  render();

  // ── Service Worker ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            document.getElementById('toast').classList.add('show');
          }
        });
      });
    });
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; location.reload(); }
    });
  }
</script>
</body>
</html>
